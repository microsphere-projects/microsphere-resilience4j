# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Maven Build

permissions:
  contents: read

on:
  push:
    branches: [ 'main' , 'dev' ]
  pull_request:
    branches: [ 'main', 'dev' , 'release' ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '17' , '21' , '25' ]
        maven-profile-spring-cloud: [ 'spring-cloud-2022' , 'spring-cloud-2023' , 'spring-cloud-2024' ,
                                      'spring-cloud-2025' ]
        maven-profile-resilience4j: [ 'resilience4j-2.0' , 'resilience4j-2.1' , 'resilience4j-2.2' ,
                                      'resilience4j-2.3' , 'resilience4j-2.4' ]
    steps:
      - name: Checkout Source
        uses: actions/checkout@v5

      - name: Setup JDK ${{ matrix.Java }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Build with Maven
        run: ./mvnw
          --batch-mode
          --update-snapshots
          --file pom.xml
          -Drevision=0.0.1-SNAPSHOT
          test
          --activate-profiles test,coverage,${{ matrix.maven-profile-spring-cloud }},${{ matrix.maven-profile-resilience4j }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: microsphere-projects/microsphere-resilience4j